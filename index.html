<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Interface</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="wheel-container">

  <div class="center-circle">
    MENU
  </div>

  <button class="wheel-btn top" data-panel="character">
    ⚔
    <span>Personaje</span>
  </button>

  <button class="wheel-btn right" data-panel="inventory">
    🎒
    <span>Inventario</span>
  </button>

  <button class="wheel-btn bottom" data-panel="money">
    💰
    <span>Dinero</span>
  </button>

  <button class="wheel-btn left" data-panel="tattoos">
    🧿
    <span>Tatuajes</span>
  </button>

</div>

<!-- PANEL PERSONAJE -->

<div class="panel hidden" id="character">

  <h2>Hoja de Personaje</h2>

  <div class="equipment-grid">

    <div class="slot">🪖</div>
    <div class="slot">⚔</div>
    <div class="slot">🛡</div>
    <div class="slot">💍</div>
    <div class="slot">👢</div>

  </div>

  <div class="stats">
    <p>Ataque: 25</p>
    <p>Defensa: 18</p>
    <p>Magia: 14</p>
    <p>Peso: 57 / 120</p>
  </div>

</div>

<!-- PANEL INVENTARIO -->

<div class="panel hidden" id="inventory">

  <h2>Inventario</h2>

  <div class="inventory-info">
    <p>Peso: 57 / 120</p>
    <p>Objetos: 23 / 100</p>
  </div>

  <div class="tabs">
    <button>Transportado</button>
    <button>Almacenado</button>
  </div>

  <div class="inventory-grid">

    <div class="item">⚔</div>
    <div class="item">🧪</div>
    <div class="item">📜</div>
    <div class="item">💍</div>

    <div class="item empty"></div>
    <div class="item empty"></div>
    <div class="item empty"></div>
    <div class="item empty"></div>

  </div>

</div>

<!-- PANEL DINERO -->

<div class="panel hidden" id="money">

  <h2>Dinero</h2>

  <div class="money-box">

    <p>🟡 Oro: 1.250</p>
    <p>⚪ Plata: 340</p>
    <p>🟤 Cobre: 980</p>

  </div>

</div>

<!-- PANEL TATUAJES -->

<div class="panel hidden" id="tattoos">

  <h2>Tatuajes</h2>

  <div class="tattoo-section">

    <h3>✋ Manos (Máx.1)</h3>
    <div class="tattoo-slots">
      <div class="tattoo-slot"></div>
    </div>

  </div>

  <div class="tattoo-section">

    <h3>💪 Brazos (Máx.2)</h3>
    <div class="tattoo-slots">
      <div class="tattoo-slot"></div>
      <div class="tattoo-slot"></div>
    </div>

  </div>

  <div class="tattoo-section">

    <h3>🫀 Torso/Espalda (Máx.3)</h3>

    <div class="tattoo-slots">
      <div class="tattoo-slot"></div>
      <div class="tattoo-slot"></div>
      <div class="tattoo-slot"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
